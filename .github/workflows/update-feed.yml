name: 🎙️ Update Podcast RSS Feed

on:
  push:
    branches: [main]
    paths:
      - 'episodes/*.mp3'
      - 'generate_feed.py'

  workflow_dispatch:  # déclenchement manuel possible

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mutagen

      - name: Generate RSS feed
        run: python generate_feed.py

      - name: Commit & push updated feed.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --cached --quiet && echo "Rien à committer" || \
            git commit -m "🎙️ Auto-update RSS feed [skip ci]"
          git push
